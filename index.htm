<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinica de Produto - Conheça nosso time!</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['ui-serif', 'Georgia', 'Cambria', '"Times New Roman"', 'Times', 'serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace'],
                        handwriting: ['Caveat', 'cursive'],
                    },
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '25%': { transform: 'translateX(-8px) rotate(-2deg)' },
                            '75%': { transform: 'translateX(8px) rotate(2deg)' }
                        },
                        fadeIn: {
                            from: { opacity: 0, transform: 'translateY(3vh)' },
                            to: { opacity: 1, transform: 'translateY(0)' }
                        },
                        popIn: {
                            from: { opacity: 0, transform: 'scale(0.9)' },
                            to: { opacity: 1, transform: 'scale(1)' }
                        },
                        breathe: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.04)' }
                        }
                    },
                    animation: {
                        shake: 'shake 0.2s ease-in-out 3',
                        fadeIn: 'fadeIn 0.8s ease-out forwards',
                        popIn: 'popIn 0.5s ease-out forwards',
                        breathe: 'breathe 4s ease-in-out infinite'
                    }
                }
            }
        }
    </script>

    <style>
        /* Bloqueia qualquer scroll geral e usa Viewport-based sizing */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* Fundo Verde Escuro */
            background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%);
            user-select: none;
        }

        /* --- Animações das Imagens do Jorginho --- */
        @keyframes scanline {
            0%, 100% { clip-path: inset(0 0 85% 0); }
            50% { clip-path: inset(85% 0 0 0); }
        }
        .animate-scanline {
            animation: scanline 3s linear infinite;
        }

        @keyframes happyLoop {
            0%, 33% { background-image: url('https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/ORIGINAL.png'); }
            33.1%, 66% { background-image: url('https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/FELIZ%201.png'); }
            66.1%, 100% { background-image: url('https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/FELIZ%202.png'); }
        }
        .animate-happy {
            animation: happyLoop 0.8s infinite;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- Animação de Escrita da Receita --- */
        @keyframes write-effect {
            0% { background-position: 100% 0; }
            100% { background-position: 0 0; }
        }
        .animate-write {
            background-image: linear-gradient(to right, #1e40af 0%, #1e40af 40%, transparent 60%, transparent 100%);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-position: 100% 0;
            animation: write-effect 1.5s ease-out forwards;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .bg-final {
            background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%) !important;
        }

        .stage-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        
        .paper-texture {
            background-color: #fdf6e3;
            position: relative;
        }
        .paper-texture::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.04;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIi8+CjxwYXRoIGQ9Ik0xLDFoMnYyaC0yeiIgZmlsbD0iIzAwMCIvPgo8L3N2Zz4=');
            mix-blend-mode: multiply;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="text-[#451a03]">

    <div id="app" class="w-screen h-screen flex flex-col p-[4vh] relative">
        <!-- O conteúdo será injetado pelo JS -->
    </div>

    <script>
        const imgBase = "https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/";

        // --- Configuração de Áudio ---
        const bgMusicUrl = 'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/cat.mp3';
        const sadSoundUrl = 'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/46268990-funny-cat-meow-246012.mp3';
        const randomSoundUrls = [
            'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/sound_garage-cat-meow-1-fx-306178.mp3',
            'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/sound_garage-cat-meow-11-fx-306193.mp3',
            'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/sound_garage-cat-meow-12-fx-306191.mp3',
            'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/sound_garage-cat-meow-7-fx-306186.mp3',
            'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/sound_garage-cat-meow-8-fx-306184.mp3'
        ];

        const bgMusic = new Audio(bgMusicUrl);
        bgMusic.loop = true;
        bgMusic.volume = 0.1;

        const sadAudio = new Audio(sadSoundUrl);
        const generalAudios = randomSoundUrls.map(url => new Audio(url));
        let soundQueue = [];
        let lastPlayedAudio = null;

        function playSadSound() {
            sadAudio.currentTime = 0;
            sadAudio.play().catch(e => console.warn("Áudio bloqueado."));
        }

        function playRandomSound() {
            if (soundQueue.length === 0) {
                let newQueue = shuffle([...generalAudios]);
                if (newQueue[0] === lastPlayedAudio) {
                    [newQueue[0], newQueue[1]] = [newQueue[1], newQueue[0]];
                }
                soundQueue = newQueue;
            }
            
            const audioToPlay = soundQueue.shift();
            lastPlayedAudio = audioToPlay;
            audioToPlay.currentTime = 0;
            audioToPlay.play().catch(e => console.warn("Áudio bloqueado."));
        }

        // --- Pré-carregamento de Imagens ---
        const imagesToPreload = [
            'ORIGINAL.png', 'RAIO%20X.png', 'FELIZ%201.png', 'FELIZ%202.png',
            'SUJO.png', 'MAGRINHO.png', 'VENDADO.png', 'GORDINHO.png',
            'SURDO.png', 'CONFUSO.png', 'TRIST%C3%83O.png'
        ];

        let isLoading = true;
        let loadProgress = 0;
        let loadedImagesCount = 0;

        function preloadImages() {
            imagesToPreload.forEach(imgName => {
                const img = new Image();
                img.onload = img.onerror = () => {
                    loadedImagesCount++;
                    loadProgress = Math.floor((loadedImagesCount / imagesToPreload.length) * 100);
                    
                    const progressBar = document.getElementById('progress-bar');
                    if (progressBar) progressBar.style.width = loadProgress + '%';

                    if (loadedImagesCount >= imagesToPreload.length) {
                        setTimeout(() => {
                            isLoading = false;
                            renderApp();
                        }, 500);
                    }
                };
                img.src = imgBase + imgName;
            });
        }

        // --- Ícones SVG com tamanho baseado em VH ---
        const iconClass = "w-[4vh] h-[4vh]";
        const icons = {
            design: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><path d="m14 14-2-2m-2-2 2 2m0 0 2-2m-2 2-2 2"/></svg>`,
            product: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
            intelligence: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
            strategy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>`,
            community: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
            cx: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
        };

        const scenarios = [
            {
                id: 1, title: "Pelo Sujo e Mal Cuidado", icon: icons.design,
                symptom: "O Jorginho tá com o pelo feio, embaraçado, sujo… ninguém quer chegar perto dele.",
                visualState: "dirty",
                options: [
                    { id: 'A', text: "Colocar uma roupinha por cima para esconder a sujeira.", type: "wrong" },
                    { id: 'B', text: "Raspar o gato inteiro e deixar ele careca.", type: "wrong" },
                    { id: 'C', text: "Dar banho, escovação e aplicar vitaminas.", type: "correct" }
                ],
                department: "Time de Design",
                explanation: "Se o visual é confuso, o cliente afasta-se. Refazemos o visual de plataformas e materiais para passar credibilidade absoluta.",
                realWorld: "Reformulação da UI da plataforma e kits físicos premium. O aluno bate o olho e sente confiança imediata."
            },
            {
                id: 2, title: "Falta de Nutrientes", icon: icons.product,
                symptom: "O Jorginho até vive… mas tá fraco. Passa o dia deitado, sem energia para nada, anémico.",
                visualState: "weak",
                options: [
                    { id: 'A', text: "Dar doses de café e energético para ele.", type: "wrong" },
                    { id: 'B', text: "Forçar ele a correr 10km na esteira.", type: "wrong" },
                    { id: 'C', text: "Aplicar dieta rica para fortalecer a musculatura.", type: "correct" }
                ],
                department: "Time de Produto (P&D)",
                explanation: "Nutrimos a nossa base. Se o conteúdo é raso, o membro não fica. Construímos materiais com densidade e aplicabilidade real.",
                realWorld: "Apostilas profundas e mapas mentais. Quando o mercado muda, o nosso P&D já estudou e transformou num framework."
            },
            {
                id: 3, title: "Visão Turva (Catarata)", icon: icons.intelligence,
                symptom: "O Jorginho tá esbarrando nos móveis. Ele dá o bote no lugar errado porque não enxerga direito.",
                visualState: "blind",
                options: [
                    { id: 'A', text: "Enrolar todos os móveis da casa em plástico bolha.", type: "wrong" },
                    { id: 'B', text: "Instalar holofotes industriais pelo teto.", type: "wrong" },
                    { id: 'C', text: "Fazer cirurgia de catarata para devolver o foco.", type: "correct" }
                ],
                department: "Inteligência de Produto",
                explanation: "Analisamos os dados para parar de dar botes no escuro. Enxergamos o comportamento para agir com precisão.",
                realWorld: "Uso de Dashboards. Detetamos exatamente onde o aluno pausa os vídeos e ajustamos aquele gargalo na jornada."
            },
            {
                id: 4, title: "Obesidade Felina", icon: icons.strategy,
                symptom: "O Jorginho tá pesado demais. Tenta pular no sofá, mas a barriga não sai do chão. Está lento.",
                visualState: "fat",
                options: [
                    { id: 'A', text: "Serrar os pés do sofá para ficar mais baixo.", type: "wrong" },
                    { id: 'B', text: "Carregar o gato no colo para sempre.", type: "wrong" },
                    { id: 'C', text: "Dieta rigorosa focando apenas no que dá agilidade.", type: "correct" }
                ],
                department: "Estratégia de Produto",
                explanation: "Otimizar significa 'matar' o que pesa e não gera valor. Descontinuamos distrações para focar no negócio principal.",
                realWorld: "Matar turmas antigas ou ferramentas secundárias. Foco total em deixar a CASA AUVP leve e escalável."
            },
            {
                id: 5, title: "Surdez", icon: icons.community,
                symptom: "O Jorginho não reage ao mundo. Chama-se, o cão ladra, e ele nem vira a orelha. Está isolado.",
                visualState: "deaf",
                options: [
                    { id: 'A', text: "Comprar um megafone e gritar mais alto.", type: "wrong" },
                    { id: 'B', text: "Desistir e começar a falar sozinho.", type: "wrong" },
                    { id: 'C', text: "Limpar os ouvidos e treinar a atenção.", type: "correct" }
                ],
                department: "Gestão de Comunidade",
                explanation: "Ouvimos ativamente o cliente. Integramos o Suporte com o Produto para criar o que as pessoas pedem.",
                realWorld: "Páginas de Lives e Fóruns nasceram do feedback. O Suporte ouve a dor, o Produto cria a solução."
            },
            {
                id: 6, title: "Desorientação", icon: icons.cx,
                symptom: "O Jorginho tá andando em círculos. Ele bate na parede e não sabe onde está a caixa de areia.",
                visualState: "lost",
                options: [
                    { id: 'A', text: "Deixar ele bater a cabeça até aprender o mapa.", type: "wrong" },
                    { id: 'B', text: "Trancar o gato dentro de uma caixa pequena.", type: "wrong" },
                    { id: 'C', text: "Guiar com petiscos e criar um caminho claro.", type: "correct" }
                ],
                department: "Experiência do Cliente (CX)",
                explanation: "Pegamos o cliente pela mão. Não deixamos que ele se sinta num limbo existencial após a assinatura.",
                realWorld: "Onboarding gamificado e jornada clara. Medalhas e cartas físicas funcionam como 'petiscos' de engajamento."
            }
        ];

        let isIntro = true;
        let currentStep = 0;
        let selectedOptionId = null;
        let isCured = false;
        let glitchError = false;
        let flowComplete = false;
        let currentShuffledOptions = [];

        function shuffle(array) {
            let newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function renderCatImage(state, isCuredFlag, isError) {
            let containerClasses = "relative w-full h-full flex items-center justify-center z-10";
            
            if (isError) {
                return `
                <div class="${containerClasses} animate-shake">
                    <div class="absolute inset-0 bg-red-600/20 rounded-full blur-[10vh]"></div>
                    <img src="${imgBase}TRIST%C3%83O.png" alt="Gato Triste" class="max-w-[100%] max-h-[100%] object-contain drop-shadow-[0_3vh_5vh_rgba(0,0,0,0.5)] relative z-20 origin-center scale-[1.10]" />
                </div>`;
            }

            if (isCuredFlag) {
                return `
                <div class="${containerClasses} animate-popIn">
                    <div class="absolute inset-0 bg-emerald-500/30 rounded-full blur-[10vh]"></div>
                    <div class="w-full h-full animate-happy drop-shadow-[0_3vh_5vh_rgba(0,0,0,0.5)] relative z-20 origin-center scale-[1.10]"></div>
                </div>`;
            }

            let imgSrc = '';
            switch(state) {
                case 'dirty': imgSrc = 'SUJO.png'; break;
                case 'weak': imgSrc = 'MAGRINHO.png'; break;
                case 'blind': imgSrc = 'VENDADO.png'; break;
                case 'fat': imgSrc = 'GORDINHO.png'; break;
                case 'deaf': imgSrc = 'SURDO.png'; break;
                case 'lost': imgSrc = 'CONFUSO.png'; break;
                default: imgSrc = 'ORIGINAL.png'; break;
            }

            return `
            <div class="${containerClasses} animate-popIn">
                <div class="absolute inset-0 bg-[#8b5a2b]/20 rounded-full blur-[10vh]"></div>
                <img src="${imgBase}${imgSrc}" alt="Paciente Jorginho" class="max-w-[100%] max-h-[100%] object-contain drop-shadow-[0_3vh_5vh_rgba(0,0,0,0.4)] relative z-20 origin-center animate-breathe" />
            </div>`;
        }

        function renderApp() {
            const container = document.getElementById('app');

            if (isIntro) {
                container.innerHTML = `
                <div class="flex flex-col items-center justify-center w-full h-full animate-fadeIn text-center cursor-pointer transition-colors hover:bg-white/5 rounded-2xl" onclick="if(!isLoading) window.startApp()">
                    <h1 class="text-[10vh] font-bold text-white mb-[2vh] font-serif drop-shadow-2xl">Clinica de Produto</h1>
                    <p class="text-[3.5vh] text-[#e6d5a1] mb-[6vh] font-serif italic tracking-widest uppercase">Conheça nosso time!</p>
                    
                    <div class="relative w-[55vh] h-[55vh] mx-auto bg-slate-900 rounded-full stage-shadow border-[1.5vh] border-slate-800 overflow-hidden z-10 mb-[6vh] shadow-[inset_0_0_5vh_rgba(0,0,0,0.8)]">
                        <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.05)_1px,transparent_1px)] bg-[size:2vh_2vh]"></div>
                        <img src="${imgBase}ORIGINAL.png" alt="Gato Original" class="absolute inset-0 w-full h-full object-contain p-[4vh] opacity-70 drop-shadow-[0_0_2vh_rgba(255,255,255,0.2)] animate-breathe" />
                        
                        <div class="absolute inset-0 w-full h-full p-[4vh] animate-scanline z-20 pointer-events-none">
                            <div class="relative w-full h-full">
                                <img src="${imgBase}RAIO%20X.png" alt="Raio X" class="w-full h-full object-contain drop-shadow-[0_0_2vh_rgba(34,211,238,0.8)] mix-blend-screen brightness-110" />
                                <div class="absolute bottom-0 left-0 w-full h-[0.5vh] bg-cyan-400 shadow-[0_0_3vh_1vh_rgba(34,211,238,1)]"></div>
                            </div>
                        </div>
                    </div>

                    ${isLoading ? `
                    <div class="w-[60vh] mx-auto">
                        <div class="flex justify-between text-[#e6d5a1] text-[2.5vh] font-bold font-mono mb-[1.5vh] uppercase tracking-widest">
                            <span>Carregando Assets...</span><span id="progress-text">${loadProgress}%</span>
                        </div>
                        <div class="w-full h-[1.5vh] bg-[#022c22] rounded-full overflow-hidden border border-[#064e3b] shadow-inner">
                            <div id="progress-bar" class="h-full bg-gradient-to-r from-[#10b981] to-[#34d399]" style="width: ${loadProgress}%"></div>
                        </div>
                    </div>
                    ` : `
                    <div class="animate-pulse text-[#e6d5a1] text-[3vh] font-bold tracking-widest font-mono uppercase bg-[#022c22]/50 px-[6vh] py-[1.5vh] rounded-full border border-[#e6d5a1]/20">
                        [ Iniciar ]
                    </div>
                    `}
                </div>`;
                return;
            }

            if (flowComplete) {
                container.innerHTML = `
                <div class="flex flex-col items-center justify-center w-full h-full animate-fadeIn text-center cursor-pointer transition-colors hover:bg-white/5 rounded-2xl" onclick="window.reboot()">
                    <h1 class="text-[10vh] font-bold text-white mb-[4vh] font-serif drop-shadow-2xl">Alta Médica Total</h1>
                    <p class="text-[3.5vh] text-[#e6d5a1] mb-[8vh] font-serif max-w-[120vh] mx-auto leading-relaxed">
                        O Jorginho está 100% curado e a estrutura do negócio está otimizada.<br>Um produto saudável atrai sempre novos habitantes.
                    </p>
                    
                    <div class="relative w-[55vh] h-[55vh] mx-auto z-10 mb-[8vh]">
                        <div class="absolute inset-0 bg-amber-500/40 rounded-full blur-[12vh]"></div>
                        <img src="${imgBase}ORIGINAL.png" alt="Gato Original" class="w-full h-full object-contain drop-shadow-[0_4vh_6vh_rgba(0,0,0,0.6)] relative z-10 animate-breathe origin-center" />
                    </div>
                    
                    <div class="animate-pulse text-[#e6d5a1] text-[3vh] font-bold tracking-widest font-mono uppercase bg-[#022c22]/50 px-[6vh] py-[1.5vh] rounded-full border border-[#e6d5a1]/20">
                        [ Nova Avaliação ]
                    </div>
                </div>`;
                return;
            }

            const s = scenarios[currentStep];
            
            let optionsHTML = currentShuffledOptions.map((opt, i) => {
                const isSel = selectedOptionId === opt.id;
                const isDisabled = selectedOptionId !== null;
                const dimClass = isDisabled && !isSel ? 'opacity-30 grayscale' : '';
                const selectedClass = isSel ? 'scale-[1.03] -translate-y-[2vh] z-40' : '';

                return `
                <div class="flex-1 h-full flex flex-col transition-all duration-500 origin-bottom cursor-pointer ${dimClass} ${selectedClass}" onclick="${!isDisabled ? `window.select('${opt.id}')` : ''}">
                    <div class="w-full h-full bg-[#fcfcfc] rounded-[2vh] stage-shadow border-[0.2vh] border-[#cbd5e1] flex flex-col overflow-hidden relative">
                        <div class="h-[5vh] bg-blue-900 w-full flex items-center px-[3vh] justify-between shrink-0">
                            <span class="text-white text-[1.8vh] font-bold tracking-widest uppercase">Receituário [ ${i + 1} ]</span>
                            <span class="text-blue-200 text-[1.6vh] font-serif italic">Clínica AUVP</span>
                        </div>
                        
                        <div class="p-[3vh] flex-grow flex flex-col relative bg-[linear-gradient(transparent_95%,_#e5e7eb_95%)] bg-[length:100%_5vh] overflow-y-auto hide-scrollbar">
                            <div class="text-blue-900 font-serif text-[6vh] font-bold opacity-10 absolute top-[2vh] left-[3vh] pointer-events-none">Rx</div>
                            
                            <p class="font-handwriting text-[4vh] leading-[5vh] mt-[3vh] z-10 px-[2vh] ${!isDisabled ? 'animate-write' : 'text-blue-800'}" ${!isDisabled ? `style="animation-delay: ${0.2 + (i * 0.15)}s;"` : ''}>
                                ${opt.text}
                            </p>
                            
                            ${isSel ? `
                            <div class="absolute bottom-[2vh] right-[2vh] z-30 transform -rotate-12 animate-popIn">
                                <div class="border-[0.6vh] ${opt.type === 'correct' ? 'border-green-600 text-green-600' : 'border-red-600 text-red-600'} rounded-[1.5vh] px-[2vh] py-[1vh] bg-white/95 shadow-xl">
                                    <span class="font-bold uppercase tracking-widest text-[2.5vh] opacity-90">
                                        ${opt.type === 'correct' ? 'APROVADO' : 'RECUSADO'}
                                    </span>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = `
            <div class="w-full h-full flex flex-col gap-[3vh]">
                
                <!-- TOP SECTION: GATO + PRONTUÁRIO -->
                <div class="flex-grow flex gap-[3vh] min-h-0 relative">
                    
                    <div class="w-[35%] h-full flex items-center justify-center relative translate-y-[6vh]">
                        ${renderCatImage(s.visualState, isCured, glitchError)}
                    </div>
                    
                    <div class="w-[65%] h-full paper-texture rounded-[3vh] stage-shadow border-[0.3vh] border-[#e6d5a1] flex flex-col p-[4vh] relative overflow-hidden">
                        
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[30%] h-[4vh] bg-gradient-to-b from-[#cbd5e1] to-[#94a3b8] border-b border-x border-[#64748b] rounded-b-[2vh] shadow-lg flex items-center justify-center z-20">
                            <div class="w-2/3 h-[0.8vh] bg-[#475569] shadow-inner rounded-full"></div>
                        </div>

                        <div class="mt-[2vh] flex justify-between items-end border-b-[0.4vh] border-[#8b5a2b]/30 pb-[2vh] shrink-0">
                            <div>
                                <h2 class="text-[4vh] font-bold uppercase tracking-widest text-[#451a03] font-serif leading-tight">${s.title}</h2>
                                <div class="flex items-center gap-[1vh] mt-[1vh] text-[2.5vh] font-bold text-[#8b5a2b] uppercase tracking-widest">
                                    ${s.icon} <span>${s.department}</span>
                                </div>
                            </div>
                            <span class="bg-[#8b5a2b]/10 px-[3vh] py-[1vh] rounded-[1.5vh] text-[2.5vh] font-bold text-[#8b5a2b] font-mono border border-[#8b5a2b]/20">
                                Ficha: 0${currentStep + 1}
                            </span>
                        </div>

                        <div class="flex-grow flex flex-col justify-start mt-[2vh] pb-[1vh]">
                            ${!isCured ? `
                            <div class="font-mono text-[#451a03] text-[2.5vh] flex-grow flex flex-col justify-start space-y-[2vh] pt-[1vh]">
                                <div class="flex justify-between border-b-[0.2vh] border-[#8b5a2b]/10 pb-[1vh]">
                                    <span class="font-bold">Paciente:</span> <span>Jorginho</span>
                                </div>
                                <div class="flex justify-between border-b-[0.2vh] border-[#8b5a2b]/10 pb-[1vh]">
                                    <span class="font-bold">Espécie:</span> <span>Felis Corporativus</span>
                                </div>
                                
                                <div class="flex-grow mt-[2vh] bg-[#8b5a2b]/5 p-[4vh] rounded-[2vh] border-[0.2vh] border-[#8b5a2b]/10 relative shadow-inner flex items-center justify-center text-center">
                                    <span class="absolute -top-[2.5vh] left-[4vh] bg-[#fdf6e3] px-[2vh] py-[0.5vh] font-bold text-red-600 text-[2vh] animate-pulse border-[0.2vh] border-red-200 rounded-[1vh]">URGENTE: SINTOMAS</span>
                                    <p class="leading-[1.4] italic text-[#5c4033] font-sans font-semibold text-[4vh] w-full">
                                        "${s.symptom}"
                                    </p>
                                </div>
                            </div>
                            ` : `
                            <div class="font-sans text-[#451a03] flex-grow flex flex-col justify-center animate-fadeIn py-[2vh] gap-[4vh]">
                                
                                <div class="flex flex-col items-start relative">
                                    <span class="inline-block bg-[#d1fae5] text-[#065f46] text-[1.8vh] px-[2vh] py-[0.8vh] rounded-[1vh] font-bold uppercase tracking-widest border-[0.2vh] border-[#a7f3d0] shadow-sm mb-[2vh]">
                                        Tratamento Bem-Sucedido
                                    </span>
                                    
                                    <p class="text-[3.5vh] leading-[1.6] border-l-[0.8vh] border-[#8b5a2b] pl-[3vh] text-[#5c4033] font-serif">
                                        ${s.explanation}
                                    </p>
                                </div>
                                
                                <div class="bg-black/5 p-[4vh] rounded-[2vh] italic text-[#5c4033] border-[0.2vh] border-[#8b5a2b]/10 shadow-inner">
                                    <strong class="uppercase text-[#b45309] text-[2.5vh] tracking-widest block mb-[1.5vh] font-sans not-italic">No Mundo Real:</strong> 
                                    <span class="text-[3.5vh] font-medium leading-snug">"${s.realWorld}"</span>
                                </div>
                                
                            </div>
                            `}
                        </div>
                    </div>
                </div>

                <!-- BOTTOM SECTION: AQUI OCORRE A ANIMAÇÃO DINÂMICA DE TAMANHO -->
                <div class="${!isCured ? 'h-[26vh]' : 'h-[10vh]'} shrink-0 w-full relative z-30 flex gap-[3vh] transition-all duration-700 ease-in-out">
                    ${!isCured ? optionsHTML : `
                    <div class="w-full h-full flex flex-col items-center justify-center animate-fadeIn cursor-pointer" onclick="window.next()">
                        <div class="animate-pulse text-[#e6d5a1] text-[2.5vh] font-bold tracking-widest font-mono uppercase bg-[#2e1e14]/70 px-[4vh] py-[1.5vh] rounded-[1.5vh] border-[0.2vh] border-[#e6d5a1]/30 hover:bg-[#2e1e14]/90 transition-colors text-center shadow-xl">
                            [ ${currentStep < scenarios.length - 1 ? 'Próximo Diagnóstico' : 'Finalizar Expediente'} ]
                        </div>
                    </div>
                    `}
                </div>
            </div>`;
        }

        window.startApp = () => {
            isIntro = false;
            bgMusic.play().catch(e => console.warn("Música bloqueada."));
            playRandomSound(); 
            renderApp();
        };

        window.select = (id) => {
            const s = scenarios[currentStep];
            const opt = s.options.find(o => o.id === id);
            selectedOptionId = id;
            
            if (opt.type === 'correct') {
                isCured = true;
                playRandomSound(); 
                renderApp();
            } else {
                glitchError = true;
                playSadSound(); 
                renderApp();
                setTimeout(() => {
                    glitchError = false;
                    selectedOptionId = null;
                    renderApp();
                }, 1500); 
            }
        };

        window.next = () => {
            if (currentStep < scenarios.length - 1) {
                currentStep++;
                isCured = false;
                selectedOptionId = null;
                currentShuffledOptions = shuffle(scenarios[currentStep].options);
                playRandomSound();
                renderApp();
            } else {
                flowComplete = true;
                playRandomSound();
                renderApp();
            }
        };

        window.reboot = () => {
            isIntro = true;
            currentStep = 0;
            isCured = false;
            selectedOptionId = null;
            flowComplete = false;
            currentShuffledOptions = shuffle(scenarios[currentStep].options);
            renderApp();
        };

        document.addEventListener('keydown', (e) => {
            if (isLoading) return;

            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                if (isIntro) {
                    window.startApp();
                } else if (flowComplete) {
                    window.reboot();
                } else if (isCured) {
                    window.next();
                }
                return;
            }

            if (!isIntro && !flowComplete && !isCured && selectedOptionId === null) {
                if (e.key === '1') window.select(currentShuffledOptions[0].id);
                if (e.key === '2') window.select(currentShuffledOptions[1].id);
                if (e.key === '3') window.select(currentShuffledOptions[2].id);
            }
        });

        currentShuffledOptions = shuffle(scenarios[currentStep].options);
        renderApp();
        preloadImages();
    </script>
</body>
</html>
