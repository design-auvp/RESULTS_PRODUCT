<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica de Produto - Conheça o nosso time!</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['ui-serif', 'Georgia', 'Cambria', '"Times New Roman"', 'Times', 'serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace'],
                        handwriting: ['Caveat', 'cursive'],
                    },
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '25%': { transform: 'translateX(-8px) rotate(-2deg)' },
                            '75%': { transform: 'translateX(8px) rotate(2deg)' }
                        },
                        fadeIn: {
                            from: { opacity: 0, transform: 'translateY(3vh)' },
                            to: { opacity: 1, transform: 'translateY(0)' }
                        },
                        popIn: {
                            from: { opacity: 0, transform: 'scale(0.9)' },
                            to: { opacity: 1, transform: 'scale(1)' }
                        },
                        breathe: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.04)' }
                        }
                    },
                    animation: {
                        shake: 'shake 0.2s ease-in-out 3',
                        fadeIn: 'fadeIn 0.8s ease-out forwards',
                        popIn: 'popIn 0.5s ease-out forwards',
                        breathe: 'breathe 4s ease-in-out infinite'
                    }
                }
            }
        }
    </script>

    <style>
        /* Base responsiva: permite scroll em telas menores */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%);
            user-select: none;
        }

        /* Em telas grandes (palestra), trava o scroll e fixa altura */
        @media (min-width: 1024px) {
            body, html {
                height: 100vh;
                overflow: hidden;
            }
        }

        /* --- Animações das Imagens do Jorginho --- */
        @keyframes scanline {
            0%, 100% { clip-path: inset(0 0 85% 0); }
            50% { clip-path: inset(85% 0 0 0); }
        }
        .animate-scanline {
            animation: scanline 3s linear infinite;
        }

        @keyframes happyLoop {
            0%, 33% { background-image: url('https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/ORIGINAL.png'); }
            33.1%, 66% { background-image: url('https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/FELIZ%201.png'); }
            66.1%, 100% { background-image: url('https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/FELIZ%202.png'); }
        }
        .animate-happy {
            animation: happyLoop 0.8s infinite;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- Animação de Escrita da Receita --- */
        @keyframes write-effect {
            0% { background-position: 100% 0; }
            100% { background-position: 0 0; }
        }
        .animate-write {
            background-image: linear-gradient(to right, #1e40af 0%, #1e40af 40%, transparent 60%, transparent 100%);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-position: 100% 0;
            animation: write-effect 1.5s ease-out forwards;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .bg-final {
            background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%) !important;
        }

        .stage-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        
        .paper-texture {
            background-color: #fdf6e3;
            position: relative;
        }
        .paper-texture::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.04;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIi8+CjxwYXRoIGQ9Ik0xLDFoMnYyaC0yeiIgZmlsbD0iIzAwMCIvPgo8L3N2Zz4=');
            mix-blend-mode: multiply;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="text-[#451a03]">

    <div id="app" class="w-full min-h-screen lg:h-screen flex flex-col p-4 sm:p-6 lg:p-[4vh] relative">
        <!-- O conteúdo será injetado pelo JS -->
    </div>

    <script>
        const imgBase = "https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/";

        // --- Configuração de Áudio ---
        const bgMusicUrl = 'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/cat.mp3';
        const sadSoundUrl = 'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/46268990-funny-cat-meow-246012.mp3';
        const randomSoundUrls = [
            'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/sound_garage-cat-meow-1-fx-306178.mp3',
            'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/sound_garage-cat-meow-11-fx-306193.mp3',
            'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/sound_garage-cat-meow-12-fx-306191.mp3',
            'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/sound_garage-cat-meow-7-fx-306186.mp3',
            'https://raw.githubusercontent.com/design-auvp/RESULTS_PRODUCT/main/sound_garage-cat-meow-8-fx-306184.mp3'
        ];

        const VOLUMES = {
            bgMusic: 0.05,
            sadMeow: 0.6,
            happyMeow: 0.45
        };

        const bgMusic = new Audio(bgMusicUrl);
        bgMusic.loop = true;
        bgMusic.volume = VOLUMES.bgMusic;

        const sadAudio = new Audio(sadSoundUrl);
        sadAudio.volume = VOLUMES.sadMeow;

        const generalAudios = randomSoundUrls.map(url => {
            const audio = new Audio(url);
            audio.volume = VOLUMES.happyMeow;
            return audio;
        });
        
        let soundQueue = [];
        let lastPlayedAudio = null;

        function playSadSound() {
            sadAudio.currentTime = 0;
            sadAudio.play().catch(e => console.warn("Áudio bloqueado."));
        }

        function playRandomSound() {
            if (soundQueue.length === 0) {
                let newQueue = shuffle([...generalAudios]);
                if (newQueue[0] === lastPlayedAudio) {
                    [newQueue[0], newQueue[1]] = [newQueue[1], newQueue[0]];
                }
                soundQueue = newQueue;
            }
            
            const audioToPlay = soundQueue.shift();
            lastPlayedAudio = audioToPlay;
            audioToPlay.currentTime = 0;
            audioToPlay.play().catch(e => console.warn("Áudio bloqueado."));
        }

        // --- Pré-carregamento de Imagens ---
        const imagesToPreload = [
            'ORIGINAL.png', 'RAIO%20X.png', 'FELIZ%201.png', 'FELIZ%202.png',
            'SUJO.png', 'MAGRINHO.png', 'VENDADO.png', 'GORDINHO.png',
            'SURDO.png', 'CONFUSO.png', 'TRIST%C3%83O.png', 'roup%C3%A3o.png'
        ];

        let isLoading = true;
        let loadProgress = 0;
        let loadedImagesCount = 0;

        function preloadImages() {
            imagesToPreload.forEach(imgName => {
                const img = new Image();
                img.onload = img.onerror = () => {
                    loadedImagesCount++;
                    loadProgress = Math.floor((loadedImagesCount / imagesToPreload.length) * 100);
                    
                    const progressBar = document.getElementById('progress-bar');
                    if (progressBar) progressBar.style.width = loadProgress + '%';

                    if (loadedImagesCount >= imagesToPreload.length) {
                        setTimeout(() => {
                            isLoading = false;
                            renderApp();
                        }, 500);
                    }
                };
                img.src = imgBase + imgName;
            });
        }

        // --- Ícones SVG com tamanho Responsivo ---
        const iconClass = "w-6 h-6 lg:w-[4vh] lg:h-[4vh]";
        const icons = {
            design: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><path d="m14 14-2-2m-2-2 2 2m0 0 2-2m-2 2-2 2"/></svg>`,
            product: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
            intelligence: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
            strategy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>`,
            community: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
            cx: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${iconClass}"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
        };

        const scenarios = [
            {
                id: 1, title: "Pelo Sujo e Mal Cuidado", icon: icons.design,
                symptom: "O Jorginho tá com o pelo feio, embaraçado, caindo... ninguém quer chegar perto dele.",
                visualState: "dirty",
                options: [
                    { id: 'A', text: "Colocar uma roupinha por cima para esconder a sujeira (paliativo).", type: "wrong" },
                    { id: 'B', text: "Raspar o gato inteiro e deixar ele careca.", type: "wrong" },
                    { id: 'C', text: "Banho, escovação e vitaminas.", type: "correct" }
                ],
                department: "Time de Design",
                explanation: "Essa é uma analogia clara com o nosso time de DESIGN. Se o visual é confuso, o cliente se afasta. Nós aplicamos essa \"cura\" quando refazemos o visual de plataformas, sites, criamos produtos físicos e artes de modo geral que passam credibilidade e confiança para o usuário.",
                realWorld: "Refizemos o site da AUVP Capital, criamos novos produtos físicos com caixas icônicas, otimizamos as ferramentas da AUVP."
            },
            {
                id: 2, title: "Falta de Nutrientes", icon: icons.product,
                symptom: "O Jorginho até vive... mas tá fraco. Passa o dia deitado, sem energia para nada, parece estar anêmico, xoxo e capenga.",
                visualState: "weak",
                options: [
                    { id: 'A', text: "Dar café e energético para ele.", type: "wrong" },
                    { id: 'B', text: "Forçar ele a correr na esteira.", type: "wrong" },
                    { id: 'C', text: "Dieta rica, focada em fortalecer os músculos.", type: "correct" }
                ],
                department: "Time de Produtos (P&D)",
                explanation: "Isso é praticamente a alma do time de produtos. É o nosso processo eterno de P&D (pesquisa e desenvolvimento) e Kaizen (melhorias). Se o conteúdo é anêmico, xoxo e capenga, certamente tem algo errado e nós não vamos reter o membro.",
                realWorld: "Na prática, criamos apostilas, mapas mentais, materiais didáticos e aulas com profundidade e qualidade."
            },
            {
                id: 3, title: "Visão Turva (Catarata)", icon: icons.intelligence,
                symptom: "O Jorginho tá esbarrando nos móveis. O brinquedo tá na frente dele, mas ele dá o bote no lugar errado porque não tá enxergando direito.",
                visualState: "blind",
                options: [
                    { id: 'A', text: "Colocar plástico bolha na casa inteira.", type: "wrong" },
                    { id: 'B', text: "Acender luzes fortíssimas pela casa.", type: "wrong" },
                    { id: 'C', text: "Cirurgia de catarata para devolver o foco e a nitidez.", type: "correct" }
                ],
                department: "Inteligência de Produto",
                explanation: "Isso é Inteligência de Produto. Nós usamos ferramentas de análise para entender o comportamento da nossa comunidade. Ao enxergar com clareza o que o aluno faz nas plataformas, conectamos a estratégia da empresa à realidade, parando de dar bote no escuro. Aqui performamos o finado valor P.A.F., novo impiedoso: analisamos os dados, pensamos devagar e implementamos rápido.",
                realWorld: "Estudamos a taxa de satisfação dos nossos produtos, analisamos os volumes de venda e cross sell, avaliamos a performance das nossas páginas e aplicações..."
            },
            {
                id: 4, title: "Obesidade Felina", icon: icons.strategy,
                symptom: "O Jorginho tá pesado demais. Ele tenta pular no sofá como antigamente, mas não consegue tirar a barriga do chão. Tá lento.",
                visualState: "fat",
                options: [
                    { id: 'A', text: "Comprar um sofá mais baixo para ele.", type: "wrong" },
                    { id: 'B', text: "Carregar ele no colo para sempre.", type: "wrong" },
                    { id: 'C', text: "Dieta rigorosa e exercícios, focando só no que dá agilidade.", type: "correct" }
                ],
                department: "Estratégia de Produto",
                explanation: "Isso é ESTRATÉGIA DE PRODUTO. O nosso P&D não serve só para criar coisas novas, mas para otimizar o que existe. Decisões que agregam valor também significam \"matar\" ferramentas ou aulas que só servem para deixar a plataforma pesada e confusa. Podemos descontinuar o que não gera valor, focar no negócio principal e simplificar, garantindo que toda energia gasta pelo time esteja sendo gasta nos objetivos maiores da empresa.",
                realWorld: "CASA AUVP e AUVP Negócios foram descontinuados. Algumas aulas da Escola foram substituídas por outras..."
            },
            {
                id: 5, title: "Surdez", icon: icons.community,
                symptom: "O Jorginho não reage ao mundo. Você chama, o cachorro late, e ele nem vira a orelha. Tá isolado.",
                visualState: "deaf",
                options: [
                    { id: 'A', text: "Gritar mais alto.", type: "wrong" },
                    { id: 'B', text: "Começar a falar sozinho.", type: "wrong" },
                    { id: 'C', text: "Limpar os ouvidos e treinar a atenção.", type: "correct" }
                ],
                department: "Gestão de Comunidade",
                explanation: "Essa é a nossa gestão de COMUNIDADE. É ouvir ativamente o cliente. Nós curamos a surdez do Jorginho analisando dados, conversando com os alunos e integrando os times de CS e Produto para garantir que estamos criando o que as pessoas REALMENTE PRECISAM.",
                realWorld: "Página de lives, otimização dos quizzes da AUVP Escola, ajuste no volume das aulas.. tudo isso a partir dos Feedbacks e análise de comportamento."
            },
            {
                id: 6, title: "Desorientação", icon: icons.cx,
                symptom: "O Jorginho tá andando em círculo. Ele bate na parede, parece não saber onde fica a caixa de areia ou a comida.",
                visualState: "lost",
                options: [
                    { id: 'A', text: "Deixar ele batendo a cabeça até aprender sozinho.", type: "wrong" },
                    { id: 'B', text: "Trancar ele numa caixa pequena.", type: "wrong" },
                    { id: 'C', text: "Guiar com petiscos e criar um caminho iluminado.", type: "correct" }
                ],
                department: "Experiência do Cliente (CX)",
                explanation: "Isso é a EXPERIÊNCIA DO CLIENTE. É o aluno não saber por onde começar. Nós curamos a desorientação através da nossa comunicação com alunos e do uso de dinâmicas como cartas e gamificação, pegando o cliente pela mão e mostrando o caminho.",
                realWorld: "Onboarding melhorado, hub de produto aumentando a clareza sobre tudo o que o cliente pode ter na AUVP e o time de relacionamento."
            }
        ];

        let isIntro = true;
        let currentStep = 0;
        let selectedOptionId = null;
        let isCured = false;
        let glitchError = false;
        let flowComplete = false;
        let currentShuffledOptions = [];

        function shuffle(array) {
            let newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function renderCatImage(state, isCuredFlag, isError) {
            let containerClasses = "relative w-full h-full flex items-center justify-center z-10";
            
            if (isError) {
                return `
                <div class="${containerClasses} animate-shake">
                    <div class="absolute inset-0 bg-red-600/20 rounded-full blur-xl lg:blur-[10vh]"></div>
                    <img src="${imgBase}TRIST%C3%83O.png" alt="Gato Triste" class="max-w-full max-h-full object-contain drop-shadow-2xl lg:drop-shadow-[0_3vh_5vh_rgba(0,0,0,0.5)] relative z-20 origin-center scale-[1.10]" />
                </div>`;
            }

            if (isCuredFlag) {
                return `
                <div class="${containerClasses} animate-popIn">
                    <div class="absolute inset-0 bg-emerald-500/30 rounded-full blur-xl lg:blur-[10vh]"></div>
                    <div class="w-full h-full animate-happy drop-shadow-2xl lg:drop-shadow-[0_3vh_5vh_rgba(0,0,0,0.5)] relative z-20 origin-center scale-[1.10]"></div>
                </div>`;
            }

            let imgSrc = '';
            switch(state) {
                case 'dirty': imgSrc = 'SUJO.png'; break;
                case 'weak': imgSrc = 'MAGRINHO.png'; break;
                case 'blind': imgSrc = 'VENDADO.png'; break;
                case 'fat': imgSrc = 'GORDINHO.png'; break;
                case 'deaf': imgSrc = 'SURDO.png'; break;
                case 'lost': imgSrc = 'CONFUSO.png'; break;
                default: imgSrc = 'ORIGINAL.png'; break;
            }

            return `
            <div class="${containerClasses} animate-popIn">
                <div class="absolute inset-0 bg-[#8b5a2b]/20 rounded-full blur-xl lg:blur-[10vh]"></div>
                <img src="${imgBase}${imgSrc}" alt="Paciente Jorginho" class="max-w-full max-h-full object-contain drop-shadow-2xl lg:drop-shadow-[0_3vh_5vh_rgba(0,0,0,0.4)] relative z-20 origin-center animate-breathe" />
            </div>`;
        }

        function renderApp() {
            const container = document.getElementById('app');

            if (isIntro) {
                container.innerHTML = `
                <div class="flex flex-col items-center justify-center w-full min-h-screen lg:h-full animate-fadeIn text-center cursor-pointer" onclick="if(!isLoading) window.startApp()">
                    <h1 class="text-5xl lg:text-[9vh] font-bold text-white mb-4 lg:mb-[2vh] font-serif drop-shadow-2xl px-4">Clínica de Produto</h1>
                    <p class="text-xl lg:text-[3vh] text-[#e6d5a1] mb-8 lg:mb-[6vh] font-serif italic tracking-widest uppercase px-4">Conheça o nosso time!</p>
                    
                    <div class="relative w-64 h-64 lg:w-[50vh] lg:h-[50vh] mx-auto bg-slate-900 rounded-full stage-shadow border-8 lg:border-[1.5vh] border-slate-800 overflow-hidden z-10 mb-8 lg:mb-[6vh] shadow-[inset_0_0_30px_rgba(0,0,0,0.8)] lg:shadow-[inset_0_0_5vh_rgba(0,0,0,0.8)]">
                        <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.05)_1px,transparent_1px)] bg-[size:15px_15px] lg:bg-[size:2vh_2vh]"></div>
                        <img src="${imgBase}ORIGINAL.png" alt="Gato Original" class="absolute inset-0 w-full h-full object-contain p-6 lg:p-[4vh] opacity-70 drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] lg:drop-shadow-[0_0_2vh_rgba(255,255,255,0.2)] animate-breathe" />
                        
                        <div class="absolute inset-0 w-full h-full p-6 lg:p-[4vh] animate-scanline z-20 pointer-events-none">
                            <div class="relative w-full h-full">
                                <img src="${imgBase}RAIO%20X.png" alt="Raio X" class="w-full h-full object-contain drop-shadow-[0_0_15px_rgba(34,211,238,0.8)] lg:drop-shadow-[0_0_2vh_rgba(34,211,238,0.8)] mix-blend-screen brightness-110" />
                                <div class="absolute bottom-0 left-0 w-full h-1 lg:h-[0.5vh] bg-cyan-400 shadow-[0_0_20px_5px_rgba(34,211,238,1)] lg:shadow-[0_0_3vh_1vh_rgba(34,211,238,1)]"></div>
                            </div>
                        </div>
                    </div>

                    ${isLoading ? `
                    <div class="w-full max-w-sm lg:w-[60vh] mx-auto px-6 lg:px-0">
                        <div class="flex justify-between text-[#e6d5a1] text-sm lg:text-[2.5vh] font-bold font-mono mb-2 lg:mb-[1.5vh] uppercase tracking-widest">
                            <span>Carregando Assets...</span><span id="progress-text">${loadProgress}%</span>
                        </div>
                        <div class="w-full h-3 lg:h-[1.5vh] bg-[#022c22] rounded-full overflow-hidden border border-[#064e3b] shadow-inner">
                            <div id="progress-bar" class="h-full bg-gradient-to-r from-[#10b981] to-[#34d399]" style="width: ${loadProgress}%"></div>
                        </div>
                    </div>
                    ` : `
                    <div class="animate-pulse text-[#e6d5a1] text-lg lg:text-[3vh] font-bold tracking-widest font-mono uppercase bg-[#022c22]/50 px-8 py-3 lg:px-[6vh] lg:py-[1.5vh] rounded-full border border-[#e6d5a1]/20">
                        [ Iniciar ]
                    </div>
                    `}
                </div>`;
                return;
            }

            if (flowComplete) {
                container.innerHTML = `
                <div class="flex flex-col items-center justify-center w-full min-h-screen lg:h-full animate-fadeIn text-center cursor-pointer" onclick="window.reboot()">
                    <h1 class="text-4xl lg:text-[8vh] font-bold text-white mb-4 lg:mb-[4vh] font-serif drop-shadow-2xl px-4">Alta Médica Total</h1>
                    <p class="text-lg lg:text-[3vh] text-[#e6d5a1] mb-8 lg:mb-[6vh] font-serif max-w-3xl lg:max-w-[120vh] mx-auto leading-relaxed px-6">
                        O Jorginho está 100% curado e a estrutura do negócio está otimizada.<br class="hidden lg:block">Um produto saudável atrai sempre novos habitantes.
                    </p>
                    
                    <div class="relative w-80 h-80 lg:w-[55vh] lg:h-[55vh] mx-auto z-10 mb-10 lg:mb-[6vh]">
                        <div class="absolute inset-0 bg-amber-500/40 rounded-full blur-2xl lg:blur-[12vh]"></div>
                        <img src="${imgBase}roup%C3%A3o.png" alt="Gato de Roupão" class="w-full h-full object-contain drop-shadow-2xl lg:drop-shadow-[0_4vh_6vh_rgba(0,0,0,0.6)] relative z-10 animate-breathe origin-center scale-110 lg:scale-[1.15]" />
                    </div>
                    
                    <div class="animate-pulse text-[#e6d5a1] text-lg lg:text-[3vh] font-bold tracking-widest font-mono uppercase bg-[#022c22]/50 px-8 py-3 lg:px-[6vh] lg:py-[1.5vh] rounded-full border border-[#e6d5a1]/20">
                        [ Nova Avaliação ]
                    </div>
                </div>`;
                return;
            }

            const s = scenarios[currentStep];
            
            let optionsHTML = currentShuffledOptions.map((opt, i) => {
                const isSel = selectedOptionId === opt.id;
                const isDisabled = selectedOptionId !== null;
                const dimClass = isDisabled && !isSel ? 'opacity-40 grayscale' : '';
                const selectedClass = isSel ? 'scale-105 lg:scale-[1.03] -translate-y-2 lg:-translate-y-[2vh] z-40' : '';

                return `
                <div class="min-w-[85vw] sm:min-w-[320px] lg:min-w-0 lg:flex-1 h-auto lg:h-full flex flex-col transition-all duration-500 origin-bottom cursor-pointer shrink-0 snap-center ${dimClass} ${selectedClass}" onclick="${!isDisabled ? `window.select('${opt.id}')` : ''}">
                    <div class="w-full h-full bg-[#fcfcfc] rounded-xl lg:rounded-[2vh] stage-shadow border-2 lg:border-[0.2vh] border-[#cbd5e1] flex flex-col overflow-hidden relative">
                        <div class="h-10 lg:h-[5vh] bg-blue-900 w-full flex items-center px-4 lg:px-[3vh] justify-between shrink-0">
                            <span class="text-white text-xs lg:text-[1.6vh] font-bold tracking-widest uppercase">Receituário [ ${i + 1} ]</span>
                            <span class="text-blue-200 text-xs lg:text-[1.4vh] font-serif italic">Clínica AUVP</span>
                        </div>
                        
                        <div class="p-6 lg:p-[3vh] flex-grow flex flex-col relative bg-[linear-gradient(transparent_95%,_#e5e7eb_95%)] bg-[length:100%_3rem] lg:bg-[length:100%_5vh] overflow-y-auto hide-scrollbar min-h-[200px] lg:min-h-0">
                            <div class="text-blue-900 font-serif text-5xl lg:text-[6vh] font-bold opacity-10 absolute top-4 lg:top-[2vh] left-4 lg:left-[3vh] pointer-events-none">Rx</div>
                            
                            <p class="font-handwriting text-2xl lg:text-[3.5vh] leading-[3rem] lg:leading-[5vh] mt-4 lg:mt-[3vh] z-10 px-2 lg:px-[2vh] ${!isDisabled ? 'animate-write' : 'text-blue-800'}" ${!isDisabled ? `style="animation-delay: ${0.2 + (i * 0.15)}s;"` : ''}>
                                ${opt.text}
                            </p>
                            
                            ${isSel ? `
                            <div class="absolute bottom-4 lg:bottom-[2vh] right-4 lg:right-[2vh] z-30 transform -rotate-12 animate-popIn">
                                <div class="border-4 lg:border-[0.6vh] ${opt.type === 'correct' ? 'border-green-600 text-green-600' : 'border-red-600 text-red-600'} rounded-lg lg:rounded-[1.5vh] px-3 lg:px-[2vh] py-1 lg:py-[1vh] bg-white/95 shadow-xl">
                                    <span class="font-bold uppercase tracking-widest text-lg lg:text-[2vh] opacity-90">
                                        ${opt.type === 'correct' ? 'APROVADO' : 'RECUSADO'}
                                    </span>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = `
            <div class="w-full flex-grow flex flex-col gap-6 lg:gap-[3vh] min-h-0 relative">
                
                <!-- TOP SECTION: GATO + PRONTUÁRIO -->
                <div class="flex flex-col lg:flex-row gap-6 lg:gap-[3vh] w-full lg:flex-grow lg:min-h-0 relative">
                    
                    <div class="w-full lg:w-[35%] h-56 sm:h-64 lg:h-full flex items-center justify-center relative lg:translate-y-[6vh] flex-shrink-0">
                        ${renderCatImage(s.visualState, isCured, glitchError)}
                    </div>
                    
                    <div class="w-full lg:w-[65%] h-auto lg:h-full paper-texture rounded-2xl lg:rounded-[3vh] stage-shadow border-2 lg:border-[0.3vh] border-[#e6d5a1] flex flex-col p-5 sm:p-6 lg:p-[4vh] relative lg:overflow-hidden">
                        
                        <div class="hidden lg:flex absolute top-0 left-1/2 -translate-x-1/2 w-[30%] h-[4vh] bg-gradient-to-b from-[#cbd5e1] to-[#94a3b8] border-b border-x border-[#64748b] rounded-b-[2vh] shadow-lg items-center justify-center z-20">
                            <div class="w-2/3 h-[0.8vh] bg-[#475569] shadow-inner rounded-full"></div>
                        </div>

                        <div class="mt-2 lg:mt-[2vh] flex flex-col sm:flex-row justify-between items-start sm:items-end border-b-2 lg:border-b-[0.4vh] border-[#8b5a2b]/30 pb-4 lg:pb-[2vh] shrink-0 gap-4 sm:gap-0">
                            <div>
                                <h2 class="text-2xl sm:text-3xl lg:text-[3.5vh] font-bold uppercase tracking-widest text-[#451a03] font-serif leading-tight">${s.title}</h2>
                                <div class="flex items-center gap-2 lg:gap-[1vh] mt-2 lg:mt-[1vh] text-base lg:text-[2vh] font-bold text-[#8b5a2b] uppercase tracking-widest">
                                    ${s.icon} <span>${s.department}</span>
                                </div>
                            </div>
                            <span class="bg-[#8b5a2b]/10 px-4 py-2 lg:px-[3vh] lg:py-[1vh] rounded-lg lg:rounded-[1.5vh] text-sm lg:text-[2vh] font-bold text-[#8b5a2b] font-mono border border-[#8b5a2b]/20">
                                Ficha: 0${currentStep + 1}
                            </span>
                        </div>

                        <div class="flex-grow flex flex-col justify-start mt-4 lg:mt-[2vh] pb-2 lg:pb-[1vh]">
                            ${!isCured ? `
                            <div class="font-mono text-[#451a03] text-sm lg:text-[2.2vh] flex-grow flex flex-col justify-start space-y-4 lg:space-y-[2vh] pt-2 lg:pt-[1vh]">
                                <div class="flex justify-between border-b lg:border-b-[0.2vh] border-[#8b5a2b]/10 pb-2 lg:pb-[1vh]">
                                    <span class="font-bold">Paciente:</span> <span>Jorginho</span>
                                </div>
                                <div class="flex justify-between border-b lg:border-b-[0.2vh] border-[#8b5a2b]/10 pb-2 lg:pb-[1vh]">
                                    <span class="font-bold">Espécie:</span> <span>Felis Corporativus</span>
                                </div>
                                
                                <div class="flex-grow mt-4 lg:mt-[2vh] bg-[#8b5a2b]/5 p-6 lg:p-[4vh] rounded-xl lg:rounded-[2vh] border lg:border-[0.2vh] border-[#8b5a2b]/10 relative shadow-inner flex items-center justify-center text-center">
                                    <span class="absolute -top-3 lg:-top-[2.5vh] left-4 lg:left-[4vh] bg-[#fdf6e3] px-3 py-1 lg:px-[2vh] lg:py-[0.5vh] font-bold text-red-600 text-xs lg:text-[1.8vh] animate-pulse border lg:border-[0.2vh] border-red-200 rounded-md lg:rounded-[1vh]">URGENTE: SINTOMAS</span>
                                    <p class="leading-[1.5] italic text-[#5c4033] font-sans font-semibold text-lg sm:text-xl lg:text-[3.5vh] w-full">
                                        "${s.symptom}"
                                    </p>
                                </div>
                            </div>
                            ` : `
                            <div class="font-sans text-[#451a03] flex-grow flex flex-col justify-center animate-fadeIn py-4 lg:py-[2vh] gap-6 lg:gap-[4vh]">
                                
                                <div class="flex flex-col items-start relative">
                                    <span class="inline-block bg-[#d1fae5] text-[#065f46] text-xs lg:text-[1.8vh] px-3 py-1 lg:px-[2vh] lg:py-[0.8vh] rounded-md lg:rounded-[1vh] font-bold uppercase tracking-widest border lg:border-[0.2vh] border-[#a7f3d0] shadow-sm mb-4 lg:mb-[2vh]">
                                        Tratamento Bem-Sucedido
                                    </span>
                                    
                                    <p class="text-lg sm:text-xl lg:text-[3vh] leading-relaxed border-l-4 lg:border-l-[0.8vh] border-[#8b5a2b] pl-4 lg:pl-[3vh] text-[#5c4033] font-serif">
                                        ${s.explanation}
                                    </p>
                                </div>
                                
                                <div class="bg-black/5 p-5 lg:p-[4vh] rounded-xl lg:rounded-[2vh] italic text-[#5c4033] border lg:border-[0.2vh] border-[#8b5a2b]/10 shadow-inner">
                                    <strong class="uppercase text-[#b45309] text-sm lg:text-[2vh] tracking-widest block mb-2 lg:mb-[1.5vh] font-sans not-italic">No Mundo Real:</strong> 
                                    <span class="text-base sm:text-lg lg:text-[2.8vh] font-medium leading-relaxed lg:leading-snug">"${s.realWorld}"</span>
                                </div>
                                
                            </div>
                            `}
                        </div>
                    </div>
                </div>

                <!-- BOTTOM SECTION: RECEITAS / BOTÃO (Rolagem horizontal no mobile, estático no desktop) -->
                <div class="flex overflow-x-auto lg:overflow-visible snap-x snap-mandatory hide-scrollbar pb-4 lg:pb-0 w-full h-auto ${!isCured ? 'lg:h-[26vh]' : 'lg:h-[10vh]'} shrink-0 relative z-30 lg:flex-row gap-4 lg:gap-[3vh] transition-all duration-700 ease-in-out">
                    ${!isCured ? optionsHTML : `
                    <div class="w-full h-full flex flex-col items-center justify-center animate-fadeIn cursor-pointer min-h-[80px]" onclick="window.next()">
                        <div class="animate-pulse text-[#e6d5a1] text-lg sm:text-xl lg:text-[2.5vh] font-bold tracking-widest font-mono uppercase bg-[#2e1e14]/70 px-6 py-4 lg:px-[4vh] lg:py-[1.5vh] rounded-xl lg:rounded-[1.5vh] border-2 lg:border-[0.2vh] border-[#e6d5a1]/30 hover:bg-[#2e1e14]/90 transition-colors text-center shadow-xl w-full lg:w-auto">
                            [ ${currentStep < scenarios.length - 1 ? 'Próximo Diagnóstico' : 'Finalizar Expediente'} ]
                        </div>
                    </div>
                    `}
                </div>
            </div>`;
        }

        window.startApp = () => {
            isIntro = false;
            bgMusic.play().catch(e => console.warn("Música bloqueada."));
            playRandomSound(); 
            renderApp();
        };

        window.select = (id) => {
            const s = scenarios[currentStep];
            const opt = s.options.find(o => o.id === id);
            selectedOptionId = id;
            
            if (opt.type === 'correct') {
                isCured = true;
                playRandomSound(); 
                renderApp();
            } else {
                glitchError = true;
                playSadSound(); 
                renderApp();
                setTimeout(() => {
                    glitchError = false;
                    selectedOptionId = null;
                    renderApp();
                }, 1500); 
            }
        };

        window.next = () => {
            if (currentStep < scenarios.length - 1) {
                currentStep++;
                isCured = false;
                selectedOptionId = null;
                currentShuffledOptions = shuffle(scenarios[currentStep].options);
                playRandomSound();
                renderApp();
            } else {
                flowComplete = true;
                playRandomSound();
                renderApp();
            }
        };

        window.reboot = () => {
            isIntro = true;
            currentStep = 0;
            isCured = false;
            selectedOptionId = null;
            flowComplete = false;
            currentShuffledOptions = shuffle(scenarios[currentStep].options);
            renderApp();
        };

        document.addEventListener('keydown', (e) => {
            if (isLoading) return;

            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                if (isIntro) {
                    window.startApp();
                } else if (flowComplete) {
                    window.reboot();
                } else if (isCured) {
                    window.next();
                }
                return;
            }

            if (!isIntro && !flowComplete && !isCured && selectedOptionId === null) {
                if (e.key === '1') window.select(currentShuffledOptions[0].id);
                if (e.key === '2') window.select(currentShuffledOptions[1].id);
                if (e.key === '3') window.select(currentShuffledOptions[2].id);
            }
        });

        currentShuffledOptions = shuffle(scenarios[currentStep].options);
        renderApp();
        preloadImages();
    </script>
</body>
</html>
